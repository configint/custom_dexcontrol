---
- name: Restart Vega robot gRPC servers on dexmate
  hosts: all
  become: yes
  vars:
    dexmate_ip: "192.168.5.20"
    dexmate_user: "dexmate"
    dexmate_pass: "hello-dex"
    # Gripper selection: "robotiq" (default, ttyUSB) or "sr_gripper" (EtherCAT).
    # Override with `-e gripper_type=sr_gripper` on the ansible-playbook CLI.
    gripper_type: "robotiq"

  tasks:
    # ── Pre-flight checks ────────────────────────────────────────────────────
    - name: Install sshpass on teleop host
      apt:
        name: sshpass
        state: present
        update_cache: false
      become: true

    - name: Ping dexmate machine ({{ dexmate_ip }})
      shell: ping -c 3 -W 2 {{ dexmate_ip }}
      args:
        executable: /bin/bash
      register: dexmate_ping
      ignore_errors: true
      become: false

    - name: Fail if dexmate machine is unreachable
      fail:
        msg: "Cannot reach {{ dexmate_ip }} — dexmate machine is offline or not connected"
      when: dexmate_ping.rc != 0

    # ── Detect Robotiq ttyUSB devices ────────────────────────────────────────
    - name: Check /dev/ttyUSB* devices on dexmate (Robotiq)
      shell: |
        sshpass -p '{{ dexmate_pass }}' ssh -o StrictHostKeyChecking=no {{ dexmate_user }}@{{ dexmate_ip }} 'ls /dev/ttyUSB*'
      args:
        executable: /bin/bash
      register: ttyusb_list
      become: false
      when: gripper_type == "robotiq"

    - name: Fail if fewer than 2 ttyUSB devices found (Robotiq)
      fail:
        msg: "Expected 2 /dev/ttyUSB* devices, found: {{ ttyusb_list.stdout_lines }}"
      when: gripper_type == "robotiq" and ttyusb_list.stdout_lines | length < 2

    - name: Resolve left/right Robotiq comports
      set_fact:
        left_gripper_port: "{{ ttyusb_list.stdout_lines | sort | first }}"
        right_gripper_port: "{{ ttyusb_list.stdout_lines | sort | last }}"
      when: gripper_type == "robotiq"

    # ── Detect SR EtherCAT ifaces ───────────────────────────────────────────
    # Probe every non-skipped NIC on dexmate, pick the ones whose first slave
    # is an SR DCU (vendor=0x534543, product=0x1002), then sort the names.
    # First name -> left arm, last -> right arm. Same convention as the
    # Robotiq /dev/ttyUSB* sort above so left/right assignment is stable.
    - name: Probe EtherCAT NICs on dexmate for SR DCU
      shell: |
        sshpass -p '{{ dexmate_pass }}' ssh -o StrictHostKeyChecking=no {{ dexmate_user }}@{{ dexmate_ip }} \
          'python - <<PY
        import pysoem
        SKIP = ("lo", "wl", "tailscale", "docker", "veth", "br-")
        SR_VENDOR, SR_PRODUCT = 0x534543, 0x1002
        found = []
        for a in pysoem.find_adapters():
            if a.name.startswith(SKIP):
                continue
            m = pysoem.Master()
            try:
                m.open(a.name)
                if m.config_init() > 0 and m.slaves[0].man == SR_VENDOR and m.slaves[0].id == SR_PRODUCT:
                    found.append(a.name)
            except Exception:
                pass
            finally:
                try: m.close()
                except: pass
        for name in sorted(found):
            print(name)
        PY'
      args:
        executable: /bin/bash
      register: sr_iface_list
      become: false
      when: gripper_type == "sr_gripper"

    - name: Fail if fewer than 2 SR DCU ifaces found
      fail:
        msg: "Expected 2 SR DCU EtherCAT ifaces, found: {{ sr_iface_list.stdout_lines }}"
      when: gripper_type == "sr_gripper" and sr_iface_list.stdout_lines | length < 2

    - name: Resolve left/right SR EtherCAT ifaces
      set_fact:
        left_gripper_port: "{{ sr_iface_list.stdout_lines | first }}"
        right_gripper_port: "{{ sr_iface_list.stdout_lines | last }}"
      when: gripper_type == "sr_gripper"

    - name: Display gripper port assignments
      debug:
        msg: "[{{ gripper_type }}] Left: {{ left_gripper_port }} / Right: {{ right_gripper_port }}"

    # ── Kill existing sessions ───────────────────────────────────────────────
    - name: Kill existing robot-server tmux session on dexmate
      shell: |
        sshpass -p '{{ dexmate_pass }}' ssh -o StrictHostKeyChecking=no {{ dexmate_user }}@{{ dexmate_ip }} \
          'tmux kill-session -t robot-server 2>/dev/null || true'
      args:
        executable: /bin/bash
      become: false

    # ── Start robot gRPC servers ─────────────────────────────────────────────
    # The gripper-port flag differs between gripper types:
    #   robotiq      -> --robotiq-comport <ttyUSB>
    #   sr_gripper   -> --gripper-iface   <EtherCAT iface>
    - name: Resolve gripper-port CLI flag
      set_fact:
        gripper_port_flag: "{{ '--gripper-iface' if gripper_type == 'sr_gripper' else '--robotiq-comport' }}"

    - name: Start robot-server tmux session on dexmate (left + right arm)
      shell: |
        sshpass -p '{{ dexmate_pass }}' ssh -o StrictHostKeyChecking=no {{ dexmate_user }}@{{ dexmate_ip }} bash << 'ENDSSH'
        tmux new-session -d -s robot-server
        tmux send-keys -t robot-server "python ~/custom_dexcontrol/src/dexcontrol/core/robotenv_vega/server.py \
            --arm-side left \
            --grpc-port 50061 \
            --gripper-type {{ gripper_type }} \
            {{ gripper_port_flag }} {{ left_gripper_port }} \
            --use-velocity-feedforward \
            --ema-alpha 0.7" C-m
        sleep 0.5
        tmux split-window -v -t robot-server
        tmux send-keys -t robot-server.1 "python ~/custom_dexcontrol/src/dexcontrol/core/robotenv_vega/server.py \
            --arm-side right \
            --grpc-port 50063 \
            --gripper-type {{ gripper_type }} \
            {{ gripper_port_flag }} {{ right_gripper_port }} \
            --use-velocity-feedforward \
            --ema-alpha 0.7" C-m
        ENDSSH
      args:
        executable: /bin/bash
      become: false

    # ── Health checks ────────────────────────────────────────────────────────
    - name: Wait for left arm server (port 50061)
      shell: |
        sshpass -p '{{ dexmate_pass }}' ssh -o StrictHostKeyChecking=no {{ dexmate_user }}@{{ dexmate_ip }} \
          'nc -z {{ dexmate_ip }} 50061'
      args:
        executable: /bin/bash
      register: health_left
      become: false
      retries: 12
      delay: 5
      until: health_left.rc == 0

    - name: Wait for right arm server (port 50063)
      shell: |
        sshpass -p '{{ dexmate_pass }}' ssh -o StrictHostKeyChecking=no {{ dexmate_user }}@{{ dexmate_ip }} \
          'nc -z {{ dexmate_ip }} 50063'
      args:
        executable: /bin/bash
      register: health_right
      become: false
      retries: 12
      delay: 5
      until: health_right.rc == 0

    - name: Display success
      debug:
        msg: "Dexmate robot-server is running — left arm (50061) and right arm (50063) are healthy"
